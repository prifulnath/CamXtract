<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
    <title>CamXtract — Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* ── Reset & Base ──────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #fff;
        }

        /* ── Video ─────────────────────────────────────────────────────── */
        #video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
        }

        /* ── Status overlay ────────────────────────────────────────────── */
        #status {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 500;
            color: rgba(255,255,255,0.75);
            background: rgba(0,0,0,0.85);
            text-align: center;
            padding: 20px;
        }

        /* ── Remote Control Panel ──────────────────────────────────────── */
        #remote-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-top: 1px solid rgba(255,255,255,0.1);
            transition: opacity 0.3s ease;
        }

        /* Auto-hide when not hovered */
        #remote-controls { opacity: 0.25; }
        #remote-controls:hover { opacity: 1; }

        /* ── Control Groups ────────────────────────────────────────────── */
        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 6px 12px;
        }

        .ctrl-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: rgba(255,255,255,0.5);
            white-space: nowrap;
        }

        .ctrl-value {
            font-size: 0.8rem;
            font-weight: 600;
            min-width: 36px;
            text-align: right;
            color: #60d4ff;
        }

        /* ── Buttons ───────────────────────────────────────────────────── */
        .ctrl-btn {
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.15s, transform 0.1s;
            white-space: nowrap;
        }
        .ctrl-btn:hover  { background: rgba(255,255,255,0.2); }
        .ctrl-btn:active { transform: scale(0.95); }
        .ctrl-btn.active { background: rgba(255, 210, 50, 0.3); border-color: #ffd232; color: #ffd232; }

        /* ── Sliders ───────────────────────────────────────────────────── */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.2);
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #60d4ff;
            border: none;
        }

        /* ── Selects ───────────────────────────────────────────────────── */
        .ctrl-select {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 0.82rem;
            cursor: pointer;
            outline: none;
        }
        .ctrl-select option { background: #1a1a1a; }

        /* ── Live badge ────────────────────────────────────────────────── */
        .live-badge {
            position: absolute;
            top: 18px;
            left: 20px;
            z-index: 10;
            background: rgba(220, 40, 40, 0.85);
            color: #fff;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <!-- Live indicator -->
    <div class="live-badge">🔴 Live</div>

    <!-- Main video -->
    <video id="video" autoplay playsinline muted></video>

    <!-- Status / connecting overlay -->
    <div id="status">⏳ Waiting for camera stream...</div>

    <!-- ── PC Remote Control Bar ── -->
    <div id="remote-controls">

        <!-- Flip -->
        <div class="ctrl-group">
            <button class="ctrl-btn" id="btn-flip">🔄 Flip</button>
        </div>

        <!-- Torch -->
        <div class="ctrl-group">
            <button class="ctrl-btn" id="btn-torch">🔦 Torch: OFF</button>
        </div>

        <!-- Zoom -->
        <div class="ctrl-group">
            <span class="ctrl-label">Zoom</span>
            <input type="range" id="zoom-slider" min="1" max="10" step="0.1" value="1">
            <span class="ctrl-value" id="zoom-value">1.0×</span>
        </div>

        <!-- Exposure -->
        <div class="ctrl-group">
            <span class="ctrl-label">Exposure</span>
            <input type="range" id="exposure-slider" min="-3" max="3" step="0.1" value="0">
            <span class="ctrl-value" id="exposure-value">0.0</span>
        </div>

        <!-- Resolution -->
        <div class="ctrl-group">
            <span class="ctrl-label">Resolution</span>
            <select class="ctrl-select" id="res-select">
                <option value="1920x1080" selected>1080p HD</option>
                <option value="2560x1440">1440p QHD</option>
                <option value="3840x2160">4K UHD</option>
                <option value="1280x720">720p</option>
                <option value="854x480">480p</option>
            </select>
        </div>

        <!-- FPS -->
        <div class="ctrl-group">
            <span class="ctrl-label">FPS</span>
            <select class="ctrl-select" id="fps-select">
                <option value="24">24 fps</option>
                <option value="30" selected>30 fps</option>
                <option value="60">60 fps</option>
            </select>
        </div>

    </div>

    <script src="/static/viewer.js?v=10"></script>
</body>

</html>
